<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Recipe - Delicious Recipes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .navbar {
      background: rgba(255, 255, 255, 0.98) !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .navbar-brand {
      font-weight: bold;
      color: #ff6b6b !important;
      font-size: 1.6rem;
    }
    .nav-link {
      color: #2d3436 !important;
      font-weight: 500;
      transition: all 0.3s;
      position: relative;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 2px;
      /* background: #ff6b6b; */
      transition: all 0.3s;
      transform: translateX(-50%);
    }
    .nav-link:hover::after, .nav-link.active::after {
      width: 80%;
    }
    .page-header {
      background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5)), 
                  url('https://images.unsplash.com/photo-1466637574441-749b8f19452f?auto=format&fit=crop&w=1600&q=80');
      background-size: cover;
      background-position: center;
      padding: 5rem 0;
      text-align: center;
    }
    .btn-custom {
      background: linear-gradient(135deg, #ff6b6b, #ff5252);
      color: white;
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 30px;
      font-weight: 700;
    }
    .btn-custom:hover {
      transform: translateY(-2px);
      color: white;
    }
    footer {
      background: linear-gradient(135deg, #2d3436 0%, #1a1d1f 100%);
      color: white;
      padding: 2rem 0;
      margin-top: 4rem;
      text-align: center;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-utensils"></i> Delicious Recipes
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="recipes.html">Recipes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="register.html">Register</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#users">Users</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#about">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="add_recipe.html">Add Recipe</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

<div class="page-header">
  <h1 class="text-white fw-bold"><i class="fas fa-plus-circle me-3"></i>Add Your Recipe</h1>
  <p class="text-white fs-5">Share your culinary creations</p>
</div>

<div class="container my-5">

  <!-- Success alert (hidden by default) -->
  <div id="successAlert" class="alert alert-success mb-4" style="border-radius:15px; display:none;">
    <i class="fas fa-check-circle me-2"></i>Recipe added successfully! 🎉
  </div>

  <!-- Form card -->
  <div class="bg-white p-4 rounded-4 shadow-lg mb-5">
    <h3 class="mb-4 text-center"><i class="fas fa-pen-fancy me-2"></i>Create New Recipe</h3>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label fw-bold">Recipe Name *</label>
        <input id="name" class="form-control" name="name" placeholder="e.g. Masala Dosa" style="border-radius: 10px" />
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label fw-bold">Region / Cuisine *</label>
        <select id="region" class="form-control" name="region" style="border-radius: 10px">
          <option value="">Select...</option>
          <option value="North India">North India</option>
          <option value="South India">South India</option>
          <option value="Punjab">Punjab</option>
          <option value="West Bengal">West Bengal</option>
          <option value="Maharashtra">Maharashtra</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="col-md-3 mb-3">
        <label class="form-label fw-bold">Cooking Time</label>
        <input id="time" class="form-control" name="time" placeholder="30 mins" style="border-radius: 10px" />
      </div>
      <div class="col-md-3 mb-3">
        <label class="form-label fw-bold">Servings</label>
        <input id="servings" type="number" class="form-control" name="servings" placeholder="4" style="border-radius: 10px" />
      </div>
      <div class="col-md-3 mb-3">
        <label class="form-label fw-bold">Type</label>
        <select id="type" class="form-control" name="type" style="border-radius: 10px">
          <option value="veg">🥬 Vegetarian</option>
          <option value="nonveg">🍗 Non-Veg</option>
        </select>
      </div>
      <div class="col-md-3 mb-3">
        <label class="form-label fw-bold">Difficulty</label>
        <select id="difficulty" class="form-control" name="difficulty" style="border-radius: 10px">
          <option value="Easy">Easy</option>
          <option value="Medium">Medium</option>
          <option value="Hard">Hard</option>
        </select>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold">Description</label>
      <textarea id="description" class="form-control" rows="2" name="description" placeholder="Describe your recipe..." style="border-radius: 10px"></textarea>
    </div>

    <div class="text-center">
      <button id="addBtn" class="btn btn-custom btn-lg px-5">
        <i class="fas fa-plus me-2"></i>Add Recipe
      </button>
    </div>
  </div>

  <!-- Saved recipes card -->
  <div class="bg-white p-4 rounded-4 shadow-lg">
    <h3 class="mb-4 text-center"><i class="fas fa-bookmark me-2"></i>Your Saved Recipes (<span id="count">0</span>)</h3>

    <div id="noRecipes" class="text-center py-5" style="display:none;">
      <i class="fas fa-book-open fa-4x mb-3 text-muted"></i>
      <p class="text-muted">No recipes yet. Add one above!</p>
    </div>

    <div id="recipesRow" class="row"></div>
  </div>

</div>

<footer>
  <p><i class="fas fa-utensils"></i> © 2025 Delicious Recipes | Made with ❤</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Vanilla JS replacement for the React app
  function loadRecipes() {
    try {
      return JSON.parse(localStorage.getItem('recipes')) || [];
    } catch (e) {
      return [];
    }
  }

  function saveRecipes(recipes) {
    localStorage.setItem('recipes', JSON.stringify(recipes));
  }

  function formatDate(d) {
    try {
      const dt = new Date(d);
      return dt.toLocaleDateString();
    } catch {
      return new Date().toLocaleDateString();
    }
  }

  function renderRecipes() {
    const recipes = loadRecipes();
    const row = document.getElementById('recipesRow');
    const count = document.getElementById('count');
    const noRecipes = document.getElementById('noRecipes');

    row.innerHTML = '';
    count.textContent = recipes.length;

    if (recipes.length === 0) {
      noRecipes.style.display = '';
      return;
    }

    noRecipes.style.display = 'none';

    recipes.forEach(r => {
      const col = document.createElement('div');
      col.className = 'col-md-4 mb-4';

      const card = document.createElement('div');
      card.className = 'card h-100 shadow-sm';
      card.style.borderRadius = '20px';
      card.style.border = 'none';

      const body = document.createElement('div');
      body.className = 'card-body p-4';

      const top = document.createElement('div');
      top.className = 'd-flex justify-content-between mb-3';

      const badge = document.createElement('span');
      badge.className = 'badge px-3 py-2';
      badge.style.background = r.type === 'veg' ? '#d4edda' : '#f8d7da';
      badge.style.color = r.type === 'veg' ? '#155724' : '#721c24';
      badge.style.borderRadius = '15px';
      badge.textContent = r.type === 'veg' ? '🥬 Veg' : '🍗 Non-Veg';

      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-sm btn-danger';
      delBtn.style.borderRadius = '10px';
      delBtn.innerHTML = '<i class="fas fa-trash"></i>';
      delBtn.addEventListener('click', () => deleteRecipe(r.id));

      top.appendChild(badge);
      top.appendChild(delBtn);

      const title = document.createElement('h4');
      title.className = 'fw-bold mb-2';
      title.textContent = r.name;

      const meta = document.createElement('div');
      meta.className = 'text-muted small mb-3';
      meta.innerHTML = `
        <div><i class="fas fa-map-marker-alt text-danger me-2"></i>${r.region || 'India'}</div>
        <div><i class="fas fa-clock text-primary me-2"></i>${r.time || 'N/A'}</div>
        <div><i class="fas fa-user text-success me-2"></i>${r.servings || '-'} servings</div>
        <div><i class="fas fa-signal text-warning me-2"></i>${r.difficulty}</div>
      `;

      const desc = document.createElement('p');
      desc.className = 'text-muted small';
      desc.textContent = r.description || '';

      const small = document.createElement('small');
      small.className = 'text-muted';
      small.textContent = 'Added: ' + (r.createdAt || formatDate(r.id));

      body.appendChild(top);
      body.appendChild(title);
      body.appendChild(meta);
      if (r.description) body.appendChild(desc);
      body.appendChild(small);

      card.appendChild(body);
      col.appendChild(card);
      row.appendChild(col);
    });
  }

  function showSuccess() {
    const a = document.getElementById('successAlert');
    a.style.display = '';
    setTimeout(() => a.style.display = 'none', 3000);
  }

  function deleteRecipe(id) {
    if (!confirm('Delete this recipe?')) return;
    const recipes = loadRecipes().filter(r => r.id !== id);
    saveRecipes(recipes);
    renderRecipes();
  }

  function clearForm() {
    document.getElementById('name').value = '';
    document.getElementById('region').value = '';
    document.getElementById('time').value = '';
    document.getElementById('servings').value = '';
    document.getElementById('type').value = 'veg';
    document.getElementById('difficulty').value = 'Easy';
    document.getElementById('description').value = '';
  }

  function handleAdd() {
    const name = document.getElementById('name').value.trim();
    if (!name) {
      alert('Recipe name is required');
      return;
    }

    const region = document.getElementById('region').value;
    const time = document.getElementById('time').value;
    const servings = document.getElementById('servings').value;
    const type = document.getElementById('type').value;
    const difficulty = document.getElementById('difficulty').value;
    const description = document.getElementById('description').value;

    const newRecipe = {
      id: Date.now(),
      name,
      region,
      time,
      servings: servings ? Number(servings) : '',
      type,
      difficulty,
      description,
      createdAt: new Date().toLocaleDateString()
    };

    const recipes = loadRecipes();
    recipes.push(newRecipe);
    saveRecipes(recipes);

    showSuccess();
    clearForm();
    renderRecipes();
  }

  document.addEventListener('DOMContentLoaded', function() {
    renderRecipes();
    document.getElementById('addBtn').addEventListener('click', handleAdd);
  });
</script>

</body>
</html>
